<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f1a;--card:#151825;--card2:#1c2030;
  --border:rgba(99,102,241,0.15);
  --accent:#818cf8;--accent-dim:rgba(129,140,248,0.1);--accent-border:rgba(129,140,248,0.25);
  --red:#f87171;--red-dim:rgba(248,113,113,0.08);
  --text:#e2e8f0;--muted:#64748b;--green:#34d399;--radius:14px
}
body{font-family:'Heebo',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-text-size-adjust:100%}
body.rtl{direction:rtl}
body.ltr{direction:ltr}

/* Header */
.header{background:#0f1120;border-bottom:1px solid var(--border);padding:14px 16px 0;position:sticky;top:0;z-index:100}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
.logo{font-family:'Bebas Neue',Impact,sans-serif;font-size:clamp(22px,6vw,28px);color:var(--accent);letter-spacing:3px;line-height:1;flex-shrink:0}
.hrow-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lang-toggle{background:var(--card2);border:1px solid var(--border);border-radius:20px;display:flex;overflow:hidden;flex-shrink:0;height:40px}
.lang-toggle button{padding:0 12px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:700;font-family:'Heebo',Arial,sans-serif;cursor:pointer;transition:.15s;line-height:40px}
.lang-toggle button.active{background:var(--accent);color:#fff}
.lang-toggle button:first-child{border-radius:20px 0 0 20px}
.lang-toggle button:last-child{border-radius:0 20px 20px 0}
.edit-btn{background:var(--card2);border:1px solid var(--border);color:var(--accent);padding:7px 16px;border-radius:20px;cursor:pointer;font-size:13px;font-family:'Heebo',Arial,sans-serif;font-weight:500;min-height:40px;min-width:40px;white-space:nowrap;transition:.15s}
.edit-btn:active{background:var(--accent);color:#fff}
.edit-btn.no-plan{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
.tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;border-bottom:1px solid var(--border)}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:72px;max-width:140px;padding:9px 6px;text-align:center;cursor:pointer;font-size:12px;font-weight:500;border-bottom:2px solid transparent;color:var(--muted);line-height:1.3;font-family:'Heebo',Arial,sans-serif;transition:color .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-label{display:block;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:11px;line-height:1.3}
@media(max-width:600px){.tab{font-size:11px;padding:8px 4px;min-width:60px;max-width:110px}}

/* Edit panel */
.edit-panel{display:none;background:#0a0c15;border-bottom:1px solid rgba(129,140,248,0.2);padding:14px 16px}
.edit-hint{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.8;padding:10px 12px;background:rgba(129,140,248,0.04);border-radius:8px;border-right:2px solid rgba(129,140,248,0.2)}
body.ltr .edit-hint{border-right:none;border-left:2px solid rgba(129,140,248,0.2)}
.edit-hint b{color:#aaa}
.edit-panel textarea{width:100%;min-height:220px;max-height:70vh;background:#07080f;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:12px;resize:vertical;font-family:'Heebo',Arial,sans-serif;font-size:14px;line-height:1.8}
body.rtl .edit-panel textarea{direction:rtl}
body.ltr .edit-panel textarea{direction:ltr}
.panel-actions{display:flex;gap:8px;margin-top:10px}
.load-btn{flex:1;padding:13px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-weight:700;cursor:pointer;font-family:'Heebo',Arial,sans-serif;font-size:15px;min-height:48px}
.load-btn:active{opacity:.85}
.delete-btn{padding:13px 16px;border:1px solid rgba(248,113,113,0.3);border-radius:10px;background:var(--red-dim);color:var(--red);font-weight:700;cursor:pointer;font-family:'Heebo',Arial,sans-serif;font-size:15px;min-height:48px;white-space:nowrap}
.delete-btn:active{background:var(--red);color:#fff}

/* Progress */
.progress-wrap{padding:12px 16px 8px}
.prog-label{font-size:13px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.prog-bar{height:3px;background:#1e2030;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);transition:width .4s;border-radius:2px}

/* Exercise list */
.ex-list{padding:8px 16px 160px;display:flex;flex-direction:column;gap:10px}

/* Exercise card */
.ex-row{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
.ex-row.done{opacity:.55;filter:grayscale(.3)}
.ex-row.superset{border-color:rgba(251,191,36,0.3)}
.ex-row.power-week{border-color:rgba(251,146,60,0.3)}

/* Card top */
.ex-top{display:flex;align-items:flex-start;gap:10px;padding:14px 16px 10px}
.ex-num{font-family:'Bebas Neue',Impact,sans-serif;font-size:22px;color:rgba(129,140,248,0.2);min-width:26px;text-align:center;flex-shrink:0;line-height:1.1;padding-top:2px}
.ex-info{flex:1;min-width:0}

/* =====================================================================

   ===================================================================== */

/**
 * cleanRawText — light cleanup only, no aggressive filtering
 * Preserves original structure; just trims lines and removes table artifacts
 */
function cleanRawText(text){
  if(!text)return'';
  // Preserve blank lines — they are block separators for parseWorkout
  // Only strip known template artifacts
  return text.split('\n')
    .map(function(l){return l.trim();})
    .filter(function(l){
      if(/^[_\-=]{4,}$/.test(l))return false;
      if(/פרמטר\s*\|/.test(l))return false;
      if(/עצימות\s*\(RIR\)/.test(l))return false;
      return true; // keep empty lines as block separators
    })
    .join('\n');
}

/**
 * parseWorkout — split into tab blocks, then parse each block
 */
function parseWorkout(text){
  // Split on 2+ blank lines
  var blocks=text.split(/\n{2,}/);
  var workouts=[],fi=0;
  blocks.forEach(function(block){
    var lines=block.split('\n').map(function(l){return l.trim();}).filter(function(l){return l!=='';});
    if(lines.length<1)return;
    var tabName=lines[0].replace(/[💪🦵💡⚡🔥✅→►▶]/g,'').trim();
    var exercises=[],descriptionLines=[],isSupersetMode=false;
    for(var i=1;i<lines.length;i++){
      var cl=lines[i];
      // Superset marker
      if(/^(סופר-?סט|superset)$/i.test(cl)){isSupersetMode=true;continue;}
      // First line after tab name with no exercises yet and no bullet/number → description
      var hasBulletOrNum=/^[💪🦵✅▶►→•·◦●\*\-–—]/.test(cl)||/^\d+[\.\)\-:\s]/.test(cl)||/^[א-וא-ת][\.\)]/.test(cl);
      var hasSetRep=/\d+\s*(?:סטים|sets?|חזרות|reps?)/i.test(cl)||/\d+\s*[xX×]\s*\d+/.test(cl);
      if(i===1&&exercises.length===0&&!hasBulletOrNum&&!hasSetRep){descriptionLines.push(cl);continue;}
      var card=createExerciseCard(cl,isSupersetMode);
      if(card){exercises.push(card);isSupersetMode=false;}
      else if(exercises.length===0){descriptionLines.push(cl);}
    }
        var isRest=/מנוחה|rest\s*day/i.test(tabName+' '+descriptionLines.join(' '))&&exercises.length===0;
    if(exercises.length>0||isRest){
      var lb=makeLabels(tabName,fi++);
      workouts.push({fullName:lb.full,sh:lb.sh,tabDescription:descriptionLines.join(' | '),exercises:exercises,isRestDay:isRest&&exercises.length===0});
    }
  });
  return workouts;
}

/**
 * createExerciseCard — the upgraded core
 *
 * Supported input patterns:
 *   1.  * Name: X סטים, Y חזרות          (original Hebrew)
 *   2.  * Name: X sets, Y reps            (original English)
 *   3.  * Name — X×Y  /  Name - XxY      (dash + multiplier)
 *   4.  * Name X×Y  /  Name 4x10         (space + multiplier at end)
 *   5.  * Name (X×Y)  /  Name (X sets)   (parentheses)
 *   6.  * Name | X סטים Y חזרות           (pipe separator)
 *   7.  Name X סטים של Y חזרות            (Hebrew inline)
 *   8.  Name X sets of Y reps             (English inline)
 *   9.  Inline: contains "X סטים" anywhere / "X sets" anywhere
 *   10. Bullet/numbered line with name only → defaults 3×10
 *   11. Plain text line that contains a known exercise pattern
 */
function createExerciseCard(line,isSuperset){
  var orig=line.trim();
  if(!orig||orig.length<2)return null;

  // Strip leading bullet / number / emoji decoration
  var clean=orig
    .replace(/^[💪🦵✅▶►→•·◦●]\s*/,'')
    .replace(/^[\*\-–—]\s*/,'')
    .replace(/^\d+[\.\)\-:\s]+/,'')
    .replace(/^[א-וא-ת][\.\)]\s*/,'')
    .trim();

  if(!clean||clean.length<2)return null;

  var hasBullet=/^[💪🦵✅▶►→•·◦●\*\-–—]/.test(orig);
  var hasNumber=/^\d+[\.\)\-:\s]/.test(orig)||/^[א-ו][\.\)]/.test(orig);

  var name=clean,sets='3',reps='10',matched=false,m;

  // ── WEEK VARIANTS (check first, extract before other patterns strip the text) ──
  var mw1=clean.match(/(?:שבועות?\s*1[-–]3|weeks?\s*1[-–]3)[^\d]*(\d+)\s*(?:סטים|sets?)[^\d]*([\d–\-]+)\s*(?:חזרות|reps?)/i);
  var mw4=clean.match(/(?:שבוע?\s*(?:4|8|4[\/,]\s*8)|weeks?\s*(?:4|8))[^\d]*(\d+)\s*(?:סטים|sets?)[^\d]*([\d–\-]+)\s*(?:חזרות|reps?)/i);

  // ── PATTERN 1: "Name: X סטים, Y חזרות" ──
  m=clean.match(/^(.+?):\s*(\d+)\s*(?:סטים|sets?)[,\s]+\s*([\d–\-]+)\s*(?:חזרות|reps?)/i);
  if(!matched&&m){name=m[1].trim();sets=m[2];reps=m[3];matched=true;}

  // ── PATTERN 2: "Name — X×Y" or "Name – X×Y" (dash then mult) ──
  if(!matched){m=clean.match(/^(.+?)\s*[—–]\s*(\d+)\s*[xX×]\s*([\d\-–]+)\s*$/);if(m){name=m[1].trim();sets=m[2];reps=m[3];matched=true;}}

  // ── PATTERN 3: "Name - X×Y" (hyphen then mult, end of string) ──
  if(!matched){m=clean.match(/^(.+?)\s+-\s+(\d+)\s*[xX×]\s*([\d\-–]+)\s*$/);if(m){name=m[1].trim();sets=m[2];reps=m[3];matched=true;}}

  // ── PATTERN 4: "Name (X×Y)" ──
  if(!matched){m=clean.match(/^(.+?)\s*\((\d+)\s*[xX×]\s*([\d\-–]+)\)/);if(m){name=m[1].trim();sets=m[2];reps=m[3];matched=true;}}

  // ── PATTERN 5: "Name | X סטים Y חזרות" or "Name | X×Y" ──
  if(!matched){m=clean.match(/^(.+?)\s*\|\s*(\d+)\s*[xX×]\s*([\d\-–]+)/);if(m){name=m[1].trim();sets=m[2];reps=m[3];matched=true;}}
  if(!matched){m=clean.match(/^(.+?)\s*\|\s*(\d+)\s*(?:סטים|sets?)[,\s]+([\d\-–]+)\s*(?:חזרות|reps?)/i);if(m){name=m[1].trim();sets=m[2];reps=m[3];matched=true;}}

  // ── PATTERN 6: "Name X×Y" (space + mult at end, no other separator) ──
  if(!matched){m=clean.match(/^(.+?)\s+(\d+)\s*[xX×]\s*([\d\-–]+)\s*$/);if(m){name=m[1].trim();sets=m[2];reps=m[3];matched=true;}}

  // ── PATTERN 7: "Name X sets of Y" / "Name X סטים של Y חזרות" ──
  if(!matched){m=clean.match(/^(.+?)\s+(\d+)\s*sets?\s+(?:of\s*)?([\d\-–]+)\s*reps?/i);if(m){name=m[1].trim();sets=m[2];reps=m[3];matched=true;}}
  if(!matched){m=clean.match(/^(.+?)\s+(\d+)\s*סטים\s*(?:של\s*)?([\d–\-]+)\s*חזרות/);if(m){name=m[1].trim();sets=m[2];reps=m[3].replace('–','-');matched=true;}}

  // ── PATTERN 8: loose — "sets" and "reps" keywords anywhere ──
  if(!matched){
    var ms=clean.match(/(\d+)\s*(?:סטים|sets?)/i);
    var mr=clean.match(/([\d–\-]+)\s*(?:חזרות|reps?)/i);
    if(ms||mr){
      // Name = text before first numeric-sets/reps mention
      var nameEnd=clean.search(/\d+\s*(?:סטים|sets?|חזרות|reps?)/i);
      if(nameEnd>2){name=clean.substring(0,nameEnd).replace(/[\s:\-,|]+$/,'').trim();}
      else{name=clean.replace(/\d+\s*(?:סטים|sets?|[xX×]|חזרות|reps?).*/i,'').replace(/[\s:\-,|]+$/,'').trim();}
      if(ms)sets=ms[1];
      if(mr)reps=mr[1].replace('–','-');
      if(name.length>1)matched=true;
    }
  }

  // ── PATTERN 9: has bullet/number → exercise with default sets/reps ──
  if(!matched&&(hasBullet||hasNumber)){name=clean;matched=true;}

  // ── PATTERN 10: plain text that looks like a short exercise name ──
  // Only if line is short, not a sentence, and not a description
  if(!matched&&clean.length<=50&&!/[.!?]$/.test(clean)&&!/^[A-Z][a-z].*\s[a-z].*\s[a-z]/.test(clean)){
    // Avoid grabbing obvious description sentences
    var wordCount=clean.split(/\s+/).length;
    if(wordCount<=5){name=clean;matched=true;}
  }

  if(!matched)return null;

  // ── Clean up name ──
  name=name
    .replace(/[;:,|]+$/,'')          // trailing punctuation
    .replace(/\s*\(.*?\)\s*$/,'')    // trailing parenthetical
    .replace(/\s*\([^)]*$/,'')       // unclosed trailing parenthesis e.g. "name ("
    .replace(/\s*[—–\-]+\s*$/,'')    // trailing dash
    .replace(/\s{2,}/g,' ')
    .trim();

  if(!name||name.length<2)return null;

  // ── Week variants ──
  var weekVariants=null;
  if(mw1||mw4){
    weekVariants={
      w1:mw1?{sets:mw1[1],reps:mw1[2]}:{sets:sets,reps:reps},
      w4:mw4?{sets:mw4[1],reps:mw4[2]}:{sets:sets,reps:reps}
    };
    if(mw1){sets=mw1[1];reps=mw1[2];}
  }

  return{name:name,sets:sets,reps:reps,cat:guesscat(name),isSuperset:!!isSuperset,weekVariants:weekVariants};
}

var HIST_KEY='gym_weight_history_v2';
function exKey(n){return n.toLowerCase().replace(/[\s\-\/]+/g,'_').replace(/[^a-z0-9_\u0590-\u05ff]/g,'').replace(/_+/g,'_').slice(0,40);}

function recordWeight(exName,kg){
  if(!kg||isNaN(kg))return;
  var h=loadHist(),k=exKey(exName);
  if(!h[k])h[k]=[];
  var today=new Date().toISOString().slice(0,10);
  var idx=-1;for(var i=0;i<h[k].length;i++){if(h[k][i].date===today){idx=i;break;}}
  if(idx>=0){h[k][idx].kg=+kg;}else{h[k].push({date:today,kg:+kg});}

function openHistModal(encodedName){

  var maxKg=Math.max.apply(null,kgs),lastKg=kgs[kgs.length-1],prevKg=kgs.length>1?kgs[kgs.length-2]:lastKg;
  var diff=lastKg-prevKg,trendColor=diff>=0?'#34d399':'#f87171',trendStr=(diff>=0?'+':'')+diff+'kg';
  statsEl.innerHTML=
    '<div class="hist-stat"><div class="hist-stat-val">'+maxKg+'kg</div><div class="hist-stat-lbl">'+T.histMax+'</div></div>'+
    '<div class="hist-stat"><div class="hist-stat-val">'+lastKg+'kg</div><div class="hist-stat-lbl">'+T.histLast+'</div></div>'+
    '<div class="hist-stat"><div class="hist-stat-val" style="color:'+trendColor+'">'+trendStr+'</div><div class="hist-stat-lbl">'+data.length+' '+T.histSess+'</div></div>';
  setTimeout(function(){
    var canvas=document.getElementById('histCanvas');
    var cw=canvas.offsetWidth||320;
    canvas.width=cw*2;canvas.height=300;canvas.style.width=cw+'px';canvas.style.height='150px';
    var ctx=canvas.getContext('2d');ctx.scale(2,2);
    var last=data.slice(-10),n=last.length;
    var kgs2=last.map(function(d){return d.kg;});
    var minK=Math.min.apply(null,kgs2)*0.92,maxK=Math.max.apply(null,kgs2)*1.06;
    var pL=8,pR=8,pT=22,pB=32,bw=Math.min(36,(cw-pL-pR)/n-5);
    var gap=(cw-pL-pR-n*bw)/(n+1);
    ctx.clearRect(0,0,cw,150);
    for(var gi=0;gi<=3;gi++){var gy=pT+(150-pT-pB)*gi/3;ctx.strokeStyle='rgba(99,102,241,0.07)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pL,gy);ctx.lineTo(cw-pR,gy);ctx.stroke();}
    last.forEach(function(d,i){
      var x=pL+gap+i*(bw+gap);
      var ratio=(d.kg-minK)/(maxK-minK||1);
      var barH=Math.max(4,(150-pT-pB)*ratio);
      var y=150-pB-barH;
      var isLast=(i===n-1);
      ctx.fillStyle=isLast?'#818cf8':'rgba(129,140,248,0.3)';
      if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,bw,barH,3);ctx.fill();}
      else{ctx.fillRect(x,y,bw,barH);}
      if(isLast){ctx.fillStyle='#818cf8';ctx.font='bold 10px Heebo,Arial,sans-serif';ctx.textAlign='center';ctx.fillText(d.kg+'kg',x+bw/2,y-5);}
      var ds=d.date.slice(5);ctx.fillStyle='rgba(100,116,139,0.7)';ctx.font='9px Heebo,Arial,sans-serif';ctx.textAlign='center';ctx.fillText(ds,x+bw/2,150-pB+12);
    });
  },60);
  document.getElementById('histModal').classList.add('open');
}

var CAT_ICON={
  'חזה':'🏋️','Chest':'🏋️',

  'גב':'🧗','Back':'🧗',

  });
  return icons.slice(0,4).join('');
}

var HEB_LETTERS=['א','ב','ג','ד','ה','ו','ז','ח','ט','י'];

var DAY_MAP_HE=[
  {k:'ראשון',s:'ראשון'},{k:'שני',s:'שני'},{k:'שלישי',s:'שלישי'},
  {k:'רביעי',s:'רביעי'},{k:'חמישי',s:'חמישי'},{k:'שישי',s:'שישי'},{k:'שבת',s:'שבת'}
];
var DAY_MAP_EN=[
  {k:'sunday',s:'Sun'},{k:'monday',s:'Mon'},{k:'tuesday',s:'Tue'},
  {k:'wednesday',s:'Wed'},{k:'thursday',s:'Thu'},{k:'friday',s:'Fri'},{k:'saturday',s:'Sat'}
];

/* safe short form — remove dash separators, truncate, strip special chars */
function toShort(name, maxLen){
  var s=name.replace(/\s*[—–:]\s*/g,' ').replace(/[()[\]{}|]/g,'').replace(/\s{2,}/g,' ').trim();
  return s.length>maxLen?s.slice(0,maxLen-1)+'…':s;
}

/* returns {label:string, isDay:boolean} */
function getTabMeta(fullName, exercises){
  var n=fullName.trim(), nl=n.toLowerCase();

  // 1. Hebrew day — only day (optionally prefixed "יום")
  for(var i=0;i<DAY_MAP_HE.length;i++){
    var dk=DAY_MAP_HE[i].k, ds=DAY_MAP_HE[i].s;
    if(n.indexOf(dk)<0) continue;
    // strip "יום", the day word, dashes, spaces — anything left?
    var rest=n.replace('יום','').replace(dk,'').replace(/[\s—–\-]/g,'').trim();
    return {label: rest===''?ds:toShort(n,13), isDay:true};
  }

  // 2. English day — only day (optionally prefixed "day")
  for(var i=0;i<DAY_MAP_EN.length;i++){
    var dk2=DAY_MAP_EN[i].k, ds2=DAY_MAP_EN[i].s;
    if(nl.indexOf(dk2)<0) continue;
    // strip the day word itself, "day" prefix, dashes, spaces
    var rest2=nl.replace(dk2,'').replace(/\bday\b/,'').replace(/[\s—–\-]/g,'').trim();
    return {label: rest2===''?ds2:toShort(n,13), isDay:true};
  }

  // 3. Sequential letter/number — A/B/C or 1/2/3 or standalone Hebrew letter
  var seqHe=/(?:^|\s)[א-י](?:\s|$)/.test(n); // single aleph-bet letter as standalone word
  var seqLat=/\b[A-Z]\b/.test(n);             // single uppercase Latin letter
  var seqNum=/\b\d+\b/.test(n);               // standalone number
  if(seqHe||seqLat||seqNum){
    var part=n.split(/\s*[—–:]\s*/)[0].trim();
    return {label:toShort(part,11), isDay:false};
  }

  // 4. Muscle icons
  var icons=getCatIcons(exercises);
  return {label: icons||toShort(n,5), isDay:false};
}

function renderTabs(){
  var el=document.getElementById('tabs');if(!plan.length){el.innerHTML='';return;}
  var html='';
  for(var i=0;i<plan.length;i++){
    var d=plan[i],total=d.exercises.length,dc=0;
    for(var j=0;j<d.exercises.length;j++){if(done[i+'_'+j])dc++;}
    var prog=dc>0?'<span style="display:block;color:var(--accent);font-size:10px;margin-top:2px">'+dc+'/'+total+'</span>':'';
    var meta=getTabMeta(d.fullName,d.exercises);
    var icons=getCatIcons(d.exercises);
    var iconsHtml=(meta.isDay||/\p{Emoji}/u.test(meta.label))?'':
      (icons?'<span style="display:block;font-size:12px;line-height:1.4;margin-top:1px">'+icons+'</span>':'');
    html+='<div class="tab'+(i===curDay?' active':'')+'" onclick="switchDay('+i+')" title="'+d.fullName+'"><span class="tab-label">'+meta.label+'</span>'+iconsHtml+prog+'</div>';
  }
  el.innerHTML=html;
}

function renderDay(){
  var content=document.getElementById('dayContent');
  if(!plan.length){content.innerHTML='<div class="empty-state"><div class="empty-big">GYM PRO</div><div class="empty-hint">'+T.emptyHint+'</div><button class="empty-cta" onclick="openEditPanel()">'+T.emptyCta+'</button></div>';return;}

  var exercises=day.exercises||[];
  var total=exercises.length,dc=0;
  for(var j=0;j<total;j++){if(done[curDay+'_'+j])dc++;}
  var pct=total?Math.round(dc/total*100):0;

  var weekMode=weekModes[curDay]||'w1';
  var html='<div class="progress-wrap"><div class="prog-label"><span style="font-weight:700;color:var(--text)">'+esc(day.fullName)+'</span><span>'+dc+'/'+total+' '+T.exs+'</span></div><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div></div>';
  if(day.tabDescription)html+='<div class="day-desc">'+esc(day.tabDescription)+'</div>';
  if(hasWeekVar){html+='<div class="week-bar"><div class="week-seg"><button onclick="setWeekMode(\'w1\')" class="'+(weekMode==='w1'?'active':'')+'">'+T.week13+'</button><button onclick="setWeekMode(\'w4\')" class="'+(weekMode==='w4'?'active':'')+'">'+T.week4+'</button></div><span class="week-bar-label">'+(weekMode==='w4'?T.weekPower:T.weekNormal)+'</span></div>';}
  html+='<div class="ex-list">';
  for(var j=0;j<exercises.length;j++){
    var ex=exercises[j];
    var dispSets=ex.sets,dispReps=ex.reps;
    var isPW=(weekMode==='w4');
    if(ex.weekVariants){var v=isPW?ex.weekVariants.w4:ex.weekVariants.w1;dispSets=v.sets;dispReps=v.reps;}
    var isDone=!!done[curDay+'_'+j],ab=isAb(ex.name);

    var wB=ab?'':'<select id="ws_'+curDay+'_'+j+'" class="weight-select'+(saved?' picked':'')+'" onchange="onWeightChange('+curDay+','+j+',this.value,\''+encodeURIComponent(ex.name)+'\')">'+buildOpts(saved)+'</select>';
    var catLabel=ex.cat?(curLang==='he'?ex.cat.he:ex.cat.en):'';
    var ssTag=ex.isSuperset?'<span class="ss-badge">'+T.supersetLbl+'</span>':'';
    var pNote=ex.weekVariants&&isPW?'<div class="power-note">'+T.powerNote+dispSets+' '+T.sets.toLowerCase()+', '+dispReps+' '+T.reps.toLowerCase()+'</div>':'';
    var rowClass='ex-row'+(isDone?' done':'')+(ex.isSuperset?' superset':'')+(ex.weekVariants&&isPW?' power-week':'');
    var enc=encodeURIComponent(ex.name);
    html+='<div class="'+rowClass+'" id="row_'+j+'">'
      +'<div class="ex-top"><div class="ex-num">'+(j+1)+'</div>'
      +'<div class="ex-info">'
        +'<div class="ex-name">'+esc(ex.name)+(catLabel?' <span class="cat-badge">'+catLabel+'</span>':'')+' '+ssTag+'</div>'
        +'<div class="ex-meta">'
          +'<div class="badge">'+T.setsLabel+'<b>'+dispSets+'</b></div>'
          +'<div class="badge">'+T.repsLabel+'<b>'+dispReps+'</b></div>'
          +wB
          +'<div class="ex-actions">'
            +'<button class="hist-btn" onclick="openHistModal(\''+enc+'\')" title="History">&#128200;</button>'
            +'<a class="yt-btn" href="'+ytUrl+'" target="_blank" title="YouTube">'+YT_SVG+'</a>'
            +'<button class="check-btn'+(isDone?' done-state':'')+'" id="cb_'+j+'" onclick="toggleDone('+j+',\''+enc+'\')">'+(isDone?T.completed:T.done)+'</button>'

function switchDay(i){curDay=i;renderTabs();renderDay();}
function toggleDone(j,enc){
  var k=curDay+'_'+j;done[k]=!done[k];saveDone();renderTabs();renderDay();
  if(done[k]){
    startTimer(decodeURIComponent(enc));
    try{navigator.vibrate(100);}catch(e){}
    var day=plan[curDay];var allDone=day&&day.exercises.every(function(_,idx){return!!done[curDay+'_'+idx];});if(allDone)updateStreak();
  }
}
function planToText(){
  if(!plan.length)return'';
  return plan.map(function(day){
    var lines=[day.fullName];
    if(day.tabDescription)lines.push(day.tabDescription);
    day.exercises.forEach(function(ex){
      lines.push('* '+ex.name+': '+ex.sets+' סטים, '+ex.reps+' חזרות');
    });
    return lines.join('\n');
  }).join('\n\n\n');
}
function sharePlan(){
  var text=planToText();if(!text)return;
  var m=document.getElementById('dropdownMenu');if(m)m.classList.remove('open');
  if(navigator.share){
    navigator.share({title:'GYM PRO',text:text}).catch(function(){});
  } else {
    try{navigator.clipboard.writeText(text).then(function(){showCopiedToast();});}
    catch(e){showCopiedToast(false);}
  }
}
